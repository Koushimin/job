<!DOCTYPE html>

    <script>
        let electricityPriceData = {
            provinces: [],
            data: {}
        };

        let selectedProvinces = []; // 存储多选的省份
        let currentPriceType = 'online';
        let trendChart = null;
        let comparisonChart = null;
        let importedExcelData = [];

        document.addEventListener('DOMContentLoaded', function() {
            initProvinceSelector();
            updateDataTable();
            initCharts();
            updateChangeRateTable();
            bindEvents();
            loadDataFromLocalStorage();
            bindExcelUploadEvent();
            bindMultiselectEvents(); // 绑定多选事件
        });

        // ========== 多选省份相关函数 ==========
        function bindMultiselectEvents() {
            const selectorBtn = document.getElementById('provinceSelectorBtn');
            const dropdown = document.getElementById('provinceDropdown');
            const selectAllCheckbox = document.getElementById('selectAllCheckbox');

            // 点击按钮展开/收起下拉框
            selectorBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });

            // 点击外部关闭下拉框
            document.addEventListener('click', function(e) {
                if (!dropdown.contains(e.target) && !selectorBtn.contains(e.target)) {
                    dropdown.classList.remove('show');
                }
            });

            // 全选/取消全选
            selectAllCheckbox.addEventListener('change', function() {
                const isChecked = this.checked;
                const checkboxes = document.querySelectorAll('#provinceOptions input[type="checkbox"]');
                checkboxes.forEach(cb => {
                    cb.checked = isChecked;
                });
                updateSelectedProvinces();
                updateAll();
            });
        }

        // 初始化省份选择器（多选版）
        function initProvinceSelector() {
            const optionsContainer = document.getElementById('provinceOptions');
            optionsContainer.innerHTML = '';
            
            // 默认选中所有省份
            selectedProvinces = [...electricityPriceData.provinces];
            
            electricityPriceData.provinces.forEach(province => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'multiselect-option';
                optionDiv.innerHTML = `
                    <input type="checkbox" id="province_${province}" value="${province}" checked>
                    <label for="province_${province}" class="cursor-pointer">${province}</label>
                `;
                
                // 绑定复选框事件
                const checkbox = optionDiv.querySelector('input');
                checkbox.addEventListener('change', function() {
                    updateSelectedProvinces();
                    updateAll();
                });
                
                optionsContainer.appendChild(optionDiv);
            });

            updateSelectedProvincesText();
            updateSelectAllState();
        }

        // 更新选中的省份列表
        function updateSelectedProvinces() {
            const checkboxes = document.querySelectorAll('#provinceOptions input[type="checkbox"]');
            selectedProvinces = [];
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    selectedProvinces.push(cb.value);
                }
            });
            updateSelectedProvincesText();
            updateSelectAllState();
        }

        // 更新选择器按钮显示文本
        function updateSelectedProvincesText() {
            const textSpan = document.getElementById('selectedProvincesText');
            if (selectedProvinces.length === 0) {
                textSpan.textContent = '请选择省份';
            } else if (selectedProvinces.length === electricityPriceData.provinces.length) {
                textSpan.textContent = '所有省份';
            } else if (selectedProvinces.length <= 3) {
                textSpan.textContent = selectedProvinces.join('、');
            } else {

        // 更新图表（支持多选省份）
        function updateCharts() {
            const timeRange = document.getElementById('trendTimeRange').value;
            const priceKey = currentPriceType === 'online' ? 'onlinePrice' : 'settlePrice';
            const priceName = currentPriceType === 'online' ? '上网电价' : '客户结算电价';

            // 获取所有时间点
            const allTimePoints = new Set();
            selectedProvinces.forEach(province => {
                if (electricityPriceData.data[province]) {
                    electricityPriceData.data[province].forEach(item => {
                        allTimePoints.add(`${item.year}年${item.month}月`);
                    });
                }
            });

            const sortedTimePoints = Array.from(allTimePoints).sort((a, b) => {
                const yearA = parseInt(a.slice(0, 4));
                const monthA = parseInt(a.slice(5, -1));
                const yearB = parseInt(b.slice(0, 4));
                const monthB = parseInt(b.slice(5, -1));
                return yearA - yearB || monthA - monthB;
            });

            const datasets = [];
            selectedProvinces.forEach((province, index) => {
                if (!electricityPriceData.data[province]) return;
                
                const provinceData = electricityPriceData.data[province].sort((a, b) => a.year - b.year || a.month - b.month);
                const dataMap = {};
                provinceData.forEach(item => {
                    dataMap[`${item.year}年${item.month}月`] = item[priceKey];
                });

                const dataValues = sortedTimePoints.map(timePoint => dataMap[timePoint] || null);

                datasets.push({
                    label: `${province} - ${priceName}`,
                    data: dataValues,
                    borderColor: provinceColors[index % provinceColors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    tension: 0.2,
                    fill: false,
                    pointRadius: 3,
                    pointHoverRadius: 5
                });
            });

            trendChart.data.labels = sortedTimePoints;
            trendChart.data.datasets = datasets;
            trendChart.update();
            updateComparisonChart();
        }

        function updateComparisonChart() {
            const priceKey = currentPriceType === 'online' ? 'onlinePrice' : 'settlePrice';
            const month = document.getElementById('monthSelector').value;
            
            const datasets = [];
            selectedProvinces.forEach((province, index) => {
                if (!electricityPriceData.data[province]) return;
                
                const data = electricityPriceData.data[province];
                const filtered = month === 'all' ? data : data.filter(i => i.month == month);
                
                const years = [...new Set(filtered.map(i=>i.year))].sort();
                if (years.length < 2) return;

                const base = years[0];
                const rates = years.slice(1).map(y => {
                    const b = filtered.find(i => i.year === base)?.[priceKey] || 0;
                    const c = filtered.find(i => i.year === y)?.[priceKey] || 0;
                    return b ? ((c-b)/b)*100 : 0;
                });

                datasets.push({
                    label: `${province} - 同比变化率`,
                    data: rates,
                    borderColor: provinceColors[index % provinceColors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    tension: 0.2,
                    fill: false
                });
            });

            // 获取所有年份作为标签
            const allYears = new Set();
            selectedProvinces.forEach(province => {
                if (electricityPriceData.data[province]) {
                    electricityPriceData.data[province].forEach(item => {
                        allYears.add(item.year);
                    });
                }
            });
            const sortedYears = Array.from(allYears).sort();
            const labels = sortedYears.slice(1).map(y => `${y}年`);

            comparisonChart.data.labels = labels;
            comparisonChart.data.datasets = datasets;
            comparisonChart.update();
        }

        // 同比变化率表格
        function updateChangeRateTable() {
            const tbody = document.getElementById('changeRateTableBody');
            tbody.innerHTML = '';
            
            const allData = [];
            selectedProvinces.forEach(province => {
                if (electricityPriceData.data[province]) {
                    electricityPriceData.data[province].forEach(item => {
                        allData.push({ ...item, province });
                    });
                }
            });
            
            const priceKey = currentPriceType === 'online' ? 'onlinePrice' : 'settlePrice';
            const priceTypeName = currentPriceType === 'online' ? '上网电价' : '客户结算电价';
            const selectedMonth = document.getElementById('monthSelector').value;

            const grouped = {};
            allData.forEach(item => {
                const key = `${item.province}-${item.month}`;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(item);
            });

            Object.values(grouped).forEach(items => {
                items.sort((a,b) => a.year - b.year);
                items.forEach((item, idx) => {
                    if (idx === 0) return;
                    if (selectedMonth !== 'all' && item.month != selectedMonth) return;

                    const lastYearItem = items[idx-1];
                    const currentPrice = item[priceKey];
                    const lastPrice = lastYearItem[priceKey];
                    const changeRate = lastPrice ? ((currentPrice - lastPrice) / lastPrice * 100).toFixed(2) : '-';

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="table-cell">${item.province}</td>
                        <td class="table-cell">${item.year}</td>
                        <td class="table-cell">${item.month}月</td>
                        <td class="table-cell">${priceTypeName}</td>
                        <td class="table-cell">${currentPrice.toFixed(4)}</td>
                        <td class="table-cell">${lastPrice.toFixed(4)}</td>
                        <td class="table-cell ${changeRate > 0 ? 'text-green-600' : changeRate < 0 ? 'text-red-600' : 'text-gray-600'}">
                            ${changeRate}%
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }

                // 清空现有数据

                for (let year = startYear; year <= endYear; year++) {

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        
                        console.log('Excel Sheet列表:', workbook.SheetNames); // 调试日志
                        // 存储解析后的数据
                        importedExcelData = [];
                        
                        // 1. 解析「上网电价」Sheet
                        const onlineSheetName = '上网电价';
                        if (workbook.SheetNames.includes(onlineSheetName)) {
                            parseSheetData(workbook, onlineSheetName, 'online');
                            console.log('上网电价解析后数据条数:', importedExcelData.length);
                        } else {
                            alert('未找到「上网电价」Sheet，请检查文件格式');
                        }

                        // 2. 解析「客户结算电价」Sheet
                        const settleSheetName = '客户结算电价';
                        if (workbook.SheetNames.includes(settleSheetName)) {
                            parseSheetData(workbook, settleSheetName, 'settle');
                            console.log('客户结算电价解析后数据条数:', importedExcelData.length);
                        } else {
                            alert('未找到「客户结算电价」Sheet，请检查文件格式');
                        }

                        alert(`成功解析Excel文件，共识别到 ${importedExcelData.length} 条数据`);
                    } catch (error) {
                        console.error('Excel解析失败:', error);
                        alert('Excel文件解析失败，请检查文件格式是否正确');
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        /**
         * 解析单个Sheet的数据（增强容错版）
         * @param {Object} workbook - Excel工作簿对象
         * @param {string} sheetName - Sheet名称
         * @param {string} priceType - 电价类型（online/settle）
         */
        function parseSheetData(workbook, sheetName, priceType) {
            const worksheet = workbook.Sheets[sheetName];
            // raw:false 强制转文本，避免格式问题
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: false });
            
            // 空数据校验：至少需要有 省份行 + 1行数据
            if (!jsonData || jsonData.length < 2) {
                console.warn(`${sheetName} Sheet数据为空或行数不足`);
                return;
            }

            // 第一步：提取省份（第一行，B列开始，对应索引1）
            const provinceRow = jsonData[0]; // 第一行：安徽省、福建省、广东省...
            const provinces = [];
            // 遍历第一行，从B列（索引1）开始提取所有非空省份名称（增强容错：过滤空值/空格）
            for (let colIndex = 1; colIndex < provinceRow.length; colIndex++) {
                const province = (provinceRow[colIndex] || '').toString().trim();
                if (province && province !== 'undefined' && province !== 'null') { // 过滤无效值
                    provinces.push({
                        name: province,       // 省份名称（如安徽省）
                        colIndex: colIndex    // 省份对应的列索引（如B列=1，C列=2...）
                    });
                }
            }

            if (provinces.length === 0) {
                console.warn(`${sheetName} Sheet未识别到任何省份`);
                return;
            }

            // 第二步：提取月份和对应电价（从第二行开始，A列是月份，其他列是对应省份的电价）
            for (let rowIndex = 1; rowIndex < jsonData.length; rowIndex++) {
                const row = jsonData[rowIndex] || []; // 容错：空行处理
                const monthText = (row[0] || '').toString().trim(); // A列的月份文本
                
                // 增强月份解析兼容性：支持 2025年1月 / 2025年01月 / 2026年1月 等格式
                const monthMatch = monthText.match(/(\d{4})年(\d{1,2})月/);
                if (!monthMatch) {
                    console.warn(`${sheetName} Sheet第${rowIndex+1}行的月份格式不匹配：${monthText}，跳过该行`);
                    continue;
                }
                
                const year = parseInt(monthMatch[1]);   // 提取年份
                const month = parseInt(monthMatch[2]);  // 提取月份
                
                // 容错：年月无效则跳过
                if (isNaN(year) || isNaN(month) || year < 2000 || year > 2100 || month < 1 || month > 12) {
                    console.warn(`${sheetName} Sheet第${rowIndex+1}行的年月无效：${year}年${month}月`);
                    continue;
                }
                
                // 遍历每个省份，提取对应列的电价（增强容错）
                provinces.forEach(province => {
                    // 提取电价数值（容错：空值/文本转数字）
                    let priceValue = (row[province.colIndex] || 0).toString().trim();
                    priceValue = parseFloat(priceValue.replace(/,/g, '')) || 0; // 过滤千分位逗号
                    
                    // 查找是否已有该省份+年月的记录（避免重复）
                    const existingItemIndex = importedExcelData.findIndex(item => 
                        item.province === province.name && 
                        item.year === year && 
                        item.month === month
                    );

                    if (existingItemIndex > -1) {
                        // 更新已有记录的电价
                        if (priceType === 'online') {
                            importedExcelData[existingItemIndex].onlinePrice = priceValue;
                        } else {
                            importedExcelData[existingItemIndex].settlePrice = priceValue;
                        }
                    } else {
                        // 新增记录
                        const newItem = {
                            province: province.name,
                            year: year,
                            month: month,
                            onlinePrice: priceType === 'online' ? priceValue : 0,
                            settlePrice: priceType === 'settle' ? priceValue : 0
                        };
                        importedExcelData.push(newItem);
                    }
                });
            }
        }

        // 保存数据到本地存储
        function saveDataToLocalStorage() {
            localStorage.setItem('electricityPriceData', JSON.stringify(electricityPriceData));
        }

        // 从本地存储加载数据
        function loadDataFromLocalStorage() {
            const savedData = localStorage.getItem('electricityPriceData');
            if (savedData) {
                electricityPriceData = JSON.parse(savedData);
                // 数据结构兼容
                if (!electricityPriceData.provinces) electricityPriceData.provinces = [];
                if (!electricityPriceData.data) electricityPriceData.data = {};
                // 默认选中所有省份
                selectedProvinces = [...electricityPriceData.provinces];
            }
        }

        // 全量更新
        function updateAll() {
            updateDataTable();
            updateCharts();
            updateChangeRateTable();
            saveDataToLocalStorage();
        }
    </script>
